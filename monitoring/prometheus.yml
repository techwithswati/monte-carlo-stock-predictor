global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: monte-carlo-stock-predictor
    environment: local

scrape_configs:
  - job_name: "mc-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
